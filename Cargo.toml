[package]
name = "gameboy-rs"
version = "0.1.0"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[features]
default = ["window"]
window = ["dep:minifb"]

[dependencies]
minifb = { version = "*", optional = true }

[[bin]]
name = "gameboy-rs"
path = "src/main.rs"
required-features = ["window"]

[[bench]]
name = "throughput"
harness = false
